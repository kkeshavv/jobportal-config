server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/application_db
spring.datasource.username=postgres
spring.datasource.password=1230
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

feign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true

resilience4j.circuitbreaker.instances.jobServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.jobServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.jobServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.jobServiceCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.timelimiter.instances.jobServiceCB.timeoutDuration=2s

resilience4j.circuitbreaker.instances.userServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.userServiceCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.timelimiter.instances.userServiceCB.timeoutDuration=2s

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
